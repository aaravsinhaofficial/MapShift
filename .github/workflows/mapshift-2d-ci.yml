name: MapShift Artifact CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  mapshift-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU package dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validate primary artifact config
        run: python3 scripts/validate_benchmark.py --tier mapshift_2d configs/benchmark/release_v0_1.json

      - name: Run environment smoke
        run: python3 scripts/smoke_map2d.py

      - name: Run unit and integration tests with torch installed
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Run reviewer artifact audit
        run: >
          python3 scripts/audit_artifact.py
          --quick
          --skip-tests
          --output-dir outputs/ci/mapshift_artifact_audit

      - name: Run deterministic mechanism diagnostic
        run: >
          python3 scripts/run_mapshift_2d_study.py
          configs/analysis/mapshift_2d_belief_update_diagnostic_v0_1.json
          --output-dir outputs/ci/mapshift_belief_update_diagnostic
          --print-summary

      - name: Regenerate paper outputs from smoke bundle
        run: >
          python3 scripts/render_paper_outputs.py
          outputs/ci/mapshift_artifact_audit/study/study_bundle.json
          --output-dir outputs/ci/rendered_paper_outputs
          --print-summary
